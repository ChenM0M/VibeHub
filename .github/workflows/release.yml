name: Release
on:
  push:
    tags:
      - 'v*'
      - '*.*.*'

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev javascriptcoregtk-4.1

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.MY_RELEASE_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VibeHub ${{ github.ref_name }}'
          args: ${{ matrix.platform == 'windows-latest' && contains(github.ref_name, '-') && '--bundles nsis' || '' }}
          releaseBody: |
            ## 🚀 更新内容 / What's New
            
            请在此处填写本次更新的内容（基于 commit 描述）
            
            ---
            
            ## 📦 下载说明 / Download Guide
            
            | 文件名 | 系统 | 类型 | 说明 |
            |--------|------|------|------|
            | `VibeHub_x.x.x_x64-setup.exe` | Windows | 安装包 | 推荐，自动安装到系统 |
            | `VibeHub_x.x.x_x64_en-US.msi` | Windows | MSI 安装包 | 企业部署推荐 |
            | `VibeHub-Portable-Windows.exe` | Windows | 便携版 | 无需安装，直接运行 |
            | `VibeHub_x.x.x_aarch64.dmg` | macOS (Apple Silicon) | 安装包 | M1/M2/M3 芯片 |
            | `VibeHub_x.x.x_x64.dmg` | macOS (Intel) | 安装包 | Intel 芯片 |
            | `VibeHub-Portable-macOS.zip` | macOS | 便携版 | 解压后直接运行 |
            | `VibeHub_x.x.x_amd64.deb` | Linux (Debian/Ubuntu) | DEB 包 | `sudo dpkg -i xxx.deb` |
            | `VibeHub_x.x.x_amd64.AppImage` | Linux | AppImage | 免安装，`chmod +x` 后运行 |
            | `VibeHub-Portable-Linux.tar.gz` | Linux | 便携版 | 解压后直接运行 |
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      # Windows Portable
      - name: Prepare Portable Version (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          Copy-Item "src-tauri\target\release\vibehub.exe" "VibeHub-Portable-Windows.exe"
        shell: pwsh

      - name: Attach Portable to Release (Windows)
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.MY_RELEASE_TOKEN }}
        with:
          files: VibeHub-Portable-Windows.exe
          tag_name: ${{ github.ref_name }}
          draft: true

      # macOS Portable
      - name: Prepare Portable Version (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          cp src-tauri/target/release/vibehub VibeHub-Portable-macOS
          chmod +x VibeHub-Portable-macOS
          zip VibeHub-Portable-macOS.zip VibeHub-Portable-macOS

      - name: Attach Portable to Release (macOS)
        if: matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.MY_RELEASE_TOKEN }}
        with:
          files: VibeHub-Portable-macOS.zip
          tag_name: ${{ github.ref_name }}
          draft: true

      # Linux Portable
      - name: Prepare Portable Version (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cp src-tauri/target/release/vibehub VibeHub-Portable-Linux
          chmod +x VibeHub-Portable-Linux
          tar -czvf VibeHub-Portable-Linux.tar.gz VibeHub-Portable-Linux

      - name: Attach Portable to Release (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.MY_RELEASE_TOKEN }}
        with:
          files: VibeHub-Portable-Linux.tar.gz
          tag_name: ${{ github.ref_name }}
          draft: true
